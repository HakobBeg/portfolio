<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Main gradient: indigo → cyan, diagonal -->
    <linearGradient id="g" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- Border gradient -->
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6366F1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Soft glow behind the H -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0B1120"/>

  <!-- Gradient border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.5"
        fill="none" stroke="url(#b)" stroke-width="1.5"/>

  <!-- H letterform with glow -->
  <g filter="url(#glow)">
    <!-- Left vertical bar -->
    <rect x="6.5" y="7"  width="4.5" height="18" rx="2" fill="url(#g)"/>
    <!-- Right vertical bar -->
    <rect x="21"  y="7"  width="4.5" height="18" rx="2" fill="url(#g)"/>
    <!-- Crossbar — perfectly bridging both bars -->
    <rect x="11"  y="13.75" width="10" height="4.5" rx="2" fill="url(#g)"/>
  </g>
</svg>
